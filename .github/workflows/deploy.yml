name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject backend credentials
        env:
          NPOINT_BIN_ID: ${{ secrets.NPOINT_BIN_ID }}
          NPOINT_TOKEN: ${{ secrets.NPOINT_TOKEN }}
        run: |
          sed -i "s|window.NPOINT_BIN_ID  = '';|window.NPOINT_BIN_ID  = '${NPOINT_BIN_ID}';|" webinar_app/public/config.js
          sed -i "s|window.NPOINT_TOKEN   = '';|window.NPOINT_TOKEN   = '${NPOINT_TOKEN}';|" webinar_app/public/config.js

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webinar_app/public
          force_orphan: true
