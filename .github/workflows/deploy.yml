name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject credentials
        env:
          FIREBASE_API_KEY:       ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:   ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL:  ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID:    ${{ secrets.FIREBASE_PROJECT_ID }}
          FACILITATOR_PASSCODE:    ${{ secrets.FACILITATOR_PASSCODE }}
          FACILITATOR_SECURE_MODE: ${{ secrets.FACILITATOR_SECURE_MODE }}
        run: |
          MISSING=""
          [ -z "$FIREBASE_API_KEY" ]      && MISSING="$MISSING FIREBASE_API_KEY"
          [ -z "$FIREBASE_AUTH_DOMAIN" ]  && MISSING="$MISSING FIREBASE_AUTH_DOMAIN"
          [ -z "$FIREBASE_DATABASE_URL" ] && MISSING="$MISSING FIREBASE_DATABASE_URL"
          [ -z "$FIREBASE_PROJECT_ID" ]   && MISSING="$MISSING FIREBASE_PROJECT_ID"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing GitHub secrets:$MISSING"
            exit 1
          fi
          python3 - <<'PYEOF'
          import os, sys
          path = 'webinar_app/public/config.js'
          txt = open(path).read()
          # Required Firebase credentials
          required = {
            "'FIREBASE_API_KEY'":      f"'{os.environ['FIREBASE_API_KEY']}'",
            "'FIREBASE_AUTH_DOMAIN'":  f"'{os.environ['FIREBASE_AUTH_DOMAIN']}'",
            "'FIREBASE_DATABASE_URL'": f"'{os.environ['FIREBASE_DATABASE_URL']}'",
            "'FIREBASE_PROJECT_ID'":   f"'{os.environ['FIREBASE_PROJECT_ID']}'",
          }
          for placeholder, value in required.items():
            if placeholder not in txt:
              sys.exit(f'ERROR: Placeholder {placeholder} not found in config.js')
            txt = txt.replace(placeholder, value, 1)
          # Optional facilitator passcode (defaults: empty passcode, secure mode off)
          optional = {
            "'FACILITATOR_PASSCODE'":    f"'{os.environ.get('FACILITATOR_PASSCODE', '')}'",
            "'FACILITATOR_SECURE_MODE'": f"'{os.environ.get('FACILITATOR_SECURE_MODE', 'false')}'",
          }
          for placeholder, value in optional.items():
            txt = txt.replace(placeholder, value, 1)
          open(path, 'w').write(txt)
          print('Credentials injected successfully.')
          PYEOF

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webinar_app/public
          force_orphan: true
