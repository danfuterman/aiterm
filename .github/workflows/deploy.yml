name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject backend credentials
        env:
          NPOINT_BIN_ID: ${{ secrets.NPOINT_BIN_ID }}
        run: |
          if [ -z "${NPOINT_BIN_ID}" ]; then
            echo "ERROR: NPOINT_BIN_ID secret is not set in GitHub repository secrets."
            exit 1
          fi
          python3 -c "
          import re, sys
          path = 'webinar_app/public/config.js'
          txt = open(path).read()
          txt2 = re.sub(r\"window\.NPOINT_BIN_ID = '';\", \"window.NPOINT_BIN_ID = '${NPOINT_BIN_ID}';\", txt)
          if txt == txt2:
              sys.exit('ERROR: Pattern not found in config.js — injection failed.')
          open(path, 'w').write(txt2)
          print('Injected NPOINT_BIN_ID successfully.')
          "

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webinar_app/public
          force_orphan: true
